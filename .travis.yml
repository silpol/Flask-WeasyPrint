dist: focal
before_install:
  - sudo apt-get -y install python3 build-essential python3-dev python3-pip python3-setuptools python3-wheel python3-cffi libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info
addons:
  apt:
    packages:
      - libcairo2-dev
      - python-pip-whl
      - python3-ply
      - python3-pycparser
    update: true

sudo: false
cache: pip
env:
  - TOXENV=pyparsing1
  - TOXENV=coverage
  - TOXENV=lint
  - TOXENV=docs
language: python
python:
    - "3.5"
    - "3.6"
    - "3.8"
install: pip3 install WeasyPrint Flask tox-travis
script: tox -p auto
